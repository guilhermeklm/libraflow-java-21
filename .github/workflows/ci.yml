name: CI LibraFlow

# Dispara a pipeline em push ou pull request para a branch main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Variáveis disponíveis em todos os jobs
env:
  # Endereço do registry onde a imagem será publicada (GitHub Container Registry)
  REGISTRY: ghcr.io
  # Nome da imagem: ghcr.io/<dono>/<repositório> (ex: ghcr.io/guilhermeklm/libraflow-java-21)
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ----------------------------------------------------------------
  # Job 1 — Testes
  # Roda em todo push e PR. Se falhar, o job de build não executa.
  # ----------------------------------------------------------------
  test:
    name: Testes
    runs-on: ubuntu-latest  # VM Ubuntu fornecida pelo GitHub (tem Docker incluso)
    environment: Desenvolvimento  # Usa as secrets e vars do environment criado no GitHub

    steps:
      # Baixa o código do repositório para a VM
      - uses: actions/checkout@v4

      # Instala o Java 21 e configura o cache do ~/.m2
      # O cache evita re-baixar todas as dependências Maven a cada run
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Executa os testes com Maven
      # O Testcontainers detecta o Docker da VM e sobe o PostgreSQL automaticamente
      # As demais envs são necessárias para o Spring carregar o contexto sem erro
      - name: Rodar testes
        run: ./mvnw test --no-transfer-progress -B
        env:
          RABBITMQ_HOST: ${{ vars.RABBITMQ_HOST }}
          RABBITMQ_PORT: ${{ vars.RABBITMQ_PORT }}
          RABBITMQ_USERNAME: ${{ vars.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ vars.RABBITMQ_PASSWORD }}
          # Valores sensíveis vêm dos GitHub Secrets (Settings → Secrets → Actions)
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

  # ----------------------------------------------------------------
  # Job 2 — Build e Push da Imagem Docker
  # Só executa se: os testes passaram E é um push para main (não PR).
  # PRs apenas validam — a imagem só é publicada quando o código entra em main.
  # ----------------------------------------------------------------
  build:
    name: Build e Push da Imagem
    runs-on: ubuntu-latest
    needs: test  # Aguarda o job test terminar com sucesso
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: Desenvolvimento  # Usa as secrets e vars do environment criado no GitHub

    permissions:
      contents: read   # Leitura do repositório
      packages: write  # Permissão para publicar no GHCR

    steps:
      # Baixa o código do repositório para a VM
      - uses: actions/checkout@v4

      # Autentica no GHCR usando o GITHUB_TOKEN
      # O GITHUB_TOKEN é gerado automaticamente pelo GitHub — não precisa criar
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Gera as tags e labels da imagem automaticamente:
      #   latest       → sempre aponta para o build mais recente de main
      #   sha-<commit> → tag imutável rastreável (ex: sha-a1b2c3d)
      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # Builda a imagem usando o Dockerfile e faz push para o GHCR
      # SKIP_TESTS=true pois os testes já rodaram no job anterior
      # cache-from/cache-to: reutiliza layers entre builds para acelerar
      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: SKIP_TESTS=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
